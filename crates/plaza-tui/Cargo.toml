[package]
name = "plaza-tui"
description = "A terminal client for Nightwave Plaza, the vaporwave radio station"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
default-run = "plaza-tui"

[[bin]]
name = "plaza-tui"
path = "src/main.rs"

